name: Build and Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pystray Pillow comtypes pyinstaller

      - name: Build exe
        run: |
          python -m PyInstaller `
            --onefile `
            --windowed `
            --name "AudioSwitcher" `
            --hidden-import=comtypes `
            --hidden-import=comtypes.client `
            --hidden-import=pystray._win32 `
            audio_switcher.py

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v$(Get-Date -Format 'yyyy.MM.dd')-$('${{ github.sha }}'.Substring(0,7))"
          gh release create $tag dist/AudioSwitcher.exe `
            --title "AudioSwitcher $tag" `
            --notes "Built from commit ${{ github.sha }}"
