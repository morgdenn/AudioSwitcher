name: Build and Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pystray Pillow comtypes pyinstaller

      - name: Download UPX
        run: |
          Invoke-WebRequest -Uri "https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip" -OutFile upx.zip
          Expand-Archive upx.zip -DestinationPath upx_dir
          echo "UPX_DIR=$((Get-Item upx_dir/upx-*).FullName)" >> $env:GITHUB_ENV

      - name: Build exe
        run: |
          python -m PyInstaller `
            --onefile `
            --windowed `
            --name "AudioSwitcher" `
            --hidden-import=comtypes `
            --hidden-import=comtypes.client `
            --hidden-import=pystray._win32 `
            --exclude-module=tkinter `
            --exclude-module=unittest `
            --exclude-module=email `
            --exclude-module=html `
            --exclude-module=http `
            --exclude-module=xml `
            --exclude-module=PIL.BmpImagePlugin `
            --exclude-module=PIL.GifImagePlugin `
            --exclude-module=PIL.JpegImagePlugin `
            --exclude-module=PIL.Jpeg2KImagePlugin `
            --exclude-module=PIL.PngImagePlugin `
            --exclude-module=PIL.TiffImagePlugin `
            --exclude-module=PIL.WebPImagePlugin `
            --upx-dir="$env:UPX_DIR" `
            audio_switcher.py

      - name: Bump patch version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $latest = gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>$null
          if ($latest -match '^v(\d+)\.(\d+)\.(\d+)$') {
            $tag = "v$($matches[1]).$($matches[2]).$([int]$matches[3] + 1)"
          } else {
            $tag = "v1.0.0"
          }
          echo "TAG=$tag" >> $env:GITHUB_ENV

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create $env:TAG dist/AudioSwitcher.exe install_startup.bat `
            --title "AudioSwitcher $env:TAG" `
            --notes "Built from commit ${{ github.sha }}"
